# https://esphome.io/guides/configuration-types.html#substitutions
substitutions:

  name: kauf-rgbsw
  friendly_name: Kauf RGB Sw
  project_ver_let: n

  disable_entities: "true"     # set to "false" to have all entities show up in Home Assistant automatically

  wifi_ap_timeout: 2min        # default to 2 minute timeout for yaml file as package.

  # modify transition length of lights
  sub_transition_length: 333ms
packages:
  versioning: !include ../shared/kauf-versioning.yaml


# https://esphome.io/components/esphome.html
esphome:
  name: $name
  friendly_name: $friendly_name
  project:
    name: $project_name
    version: $project_ver_num($project_ver_let)


# https://esphome.io/components/wifi.html
wifi:

  # **** ENTER WI-FI CREDENTIALS HERE, USING SECRETS.YAML RECOMMENDED ****
  ssid: initial_ap            # !secret wifi_ssid
  password: asdfasdfasdfasdf  # !secret wifi_password

  # default is 20, 17 is recommended.
  output_power: 17

  ap:
    ap_timeout: $wifi_ap_timeout

  min_auth_mode: WPA2


# https://esphome.io/components/captive_portal.html
captive_portal:


# https://esphome.io/components/logger.html
logger:


# https://esphome.io/components/api.html
api:


# https://esphome.io/components/ota.html
ota:
  - platform: web_server
  - platform: esphome


safe_mode:


# https://esphome.io/components/web_server.html
web_server:


# https://esphome.io/components/binary_sensor/index.html
binary_sensor:

    # https://esphome.io/components/binary_sensor/gpio.html
  - platform: gpio
    id: main_button
    name: Button
    pin:
      number: $sub_button_pin
      mode:
        input: true
        pullup: true
      inverted: true

    on_press:
        then:
          - switch.toggle: relay


# https://esphome.io/components/switch/index.html
switch:
  - platform: gpio
    id: relay
    pin: $sub_relay_pin
    name: ""
    restore_mode: RESTORE_DEFAULT_OFF


# https://esphome.io/components/light/index.html
# https://esphome.io/components/light/rgb.html
light:

  - platform: rgb
    name: Small Light
    id: small_light
    red: pwm1_red
    green: pwm1_green
    blue: pwm1_blue
    default_transition_length: $sub_transition_length
    restore_mode: RESTORE_DEFAULT_ON

  - platform: rgb
    name: Big Light
    id: big_light
    red: pwm2_red
    green: pwm2_green
    blue: pwm2_blue
    default_transition_length: $sub_transition_length
    restore_mode: RESTORE_DEFAULT_ON
