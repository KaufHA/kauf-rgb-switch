# Stock target for ESP8266 1MiB (esp01_1m board).

packages:
  Kauf.PWM: !include ../pwm/esp8266-pwm.yaml

substitutions:
  sub_4m: "false"

  # GPIO pin assignments
  sub_button_pin: GPIO13
  sub_relay_pin:  GPIO15

  # PWM pin assignments
  sub_pwm1_red_pin:   GPIO0
  sub_pwm1_green_pin: GPIO12
  sub_pwm1_blue_pin:  GPIO2
  sub_pwm2_red_pin:   GPIO14
  sub_pwm2_green_pin: GPIO5
  sub_pwm2_blue_pin:  GPIO4
  sub_pwm2_green_max_power: "0.4"
  sub_pwm2_blue_max_power:  "0.35"

esp8266:
  board: esp01_1m
  restore_from_flash: true
  early_pin_init: false

esphome:
  on_boot:
    then:
        # set default values for template sensors, otherwise they are unknown.
      - binary_sensor.template.publish:
          id: sensor_4m
          state: $sub_4m

binary_sensor:
  - platform: template
    name: 4MiB
    id: sensor_4m
    disabled_by_default: $disable_entities
